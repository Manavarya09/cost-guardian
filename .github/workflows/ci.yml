name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Verify package.json parses
        run: node -e "require('./package.json'); console.log('ok')"
      - name: Verify install.sh syntax
        run: bash -n install.sh && echo "install.sh syntax OK"
